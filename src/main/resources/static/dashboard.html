<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0f0f1a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 30px;
        }
        .navbar-brand {
            color: #4cc9f0 !important;
            font-weight: 700;
            font-size: 22px;
        }
        .nav-link {
            color: rgba(255,255,255,0.7) !important;
            margin: 0 10px;
            transition: color 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            color: #4cc9f0 !important;
        }
        .btn-logout {
            background: rgba(255,99,99,0.15);
            border: 1px solid rgba(255,99,99,0.3);
            color: #ff6363;
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 14px;
        }
        .btn-logout:hover {
            background: rgba(255,99,99,0.3);
            color: #ff6363;
        }
        .main-content {
            padding: 30px;
        }
        .welcome-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .welcome-sub {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-icon {
            font-size: 30px;
            margin-bottom: 15px;
        }
        .stat-label {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }
        .stat-card.blue { border-left: 4px solid #4cc9f0; }
        .stat-card.green { border-left: 4px solid #4cc996; }
        .stat-card.red { border-left: 4px solid #ff6363; }
        .stat-card.purple { border-left: 4px solid #a855f7; }
        .chart-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
        }
        .month-selector {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            padding: 6px 12px;
            font-size: 14px;
        }
        .month-selector option {
            background: #1a1a2e;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <span class="navbar-brand">💰 FinanceTracker</span>
    <div class="ms-auto d-flex align-items-center">
        <a href="dashboard.html" class="nav-link active">Dashboard</a>
        <a href="expenses.html" class="nav-link">Expenses</a>
        <a href="budget.html" class="nav-link">Budget</a>
        <button class="btn-logout ms-3" onclick="logout()">
            <i class="fas fa-sign-out-alt me-1"></i>Logout
        </button>
    </div>
</nav>

<!-- Main Content -->
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <div class="welcome-text">Hello, <span id="userName">User</span> 👋</div>
            <div class="welcome-sub">Here's your financial overview</div>
        </div>
        <select class="month-selector" id="monthSelector" onchange="loadDashboard()">
        </select>
    </div>

    <!-- Stat Cards -->
    <div class="row g-4">
        <div class="col-md-3">
            <div class="stat-card blue">
                <div class="stat-icon">💸</div>
                <div class="stat-label">Total Spent This Month</div>
                <div class="stat-value" id="totalSpent">₹0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card green">
                <div class="stat-icon">🎯</div>
                <div class="stat-label">Monthly Budget</div>
                <div class="stat-value" id="monthlyBudget">₹0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card purple">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Remaining Budget</div>
                <div class="stat-value" id="remainingBudget">₹0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card red">
                <div class="stat-icon">📊</div>
                <div class="stat-label">Top Category</div>
                <div class="stat-value" id="topCategory">-</div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row mt-4">
        <div class="col-md-5">
            <div class="chart-card">
                <div class="chart-title">📊 Category-wise Spending</div>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
        <div class="col-md-7">
            <div class="chart-card">
                <div class="chart-title">📈 Spending by Category</div>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const userId = localStorage.getItem('userId');
    const userName = localStorage.getItem('userName');

    if (!userId) window.location.href = 'login.html';

    document.getElementById('userName').textContent = userName || 'User';

    // Populate month selector
    function populateMonths() {
        const select = document.getElementById('monthSelector');
        const now = new Date();
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            const label = d.toLocaleString('default', { month: 'long', year: 'numeric' });
            const opt = document.createElement('option');
            opt.value = value;
            opt.textContent = label;
            select.appendChild(opt);
        }
    }

    let pieChart, barChart;

    async function loadDashboard() {
        const month = document.getElementById('monthSelector').value;

        try {
            const res = await fetch(`http://localhost:8080/api/dashboard/user/${userId}/month/${month}`);
            const data = await res.json();

            document.getElementById('totalSpent').textContent = '₹' + (data.totalMonthlySpending || 0).toFixed(2);
            document.getElementById('monthlyBudget').textContent = '₹' + (data.monthlyBudget || 0).toFixed(2);
            document.getElementById('remainingBudget').textContent = '₹' + (data.remainingBudget || 0).toFixed(2);

            const categories = data.categoryWiseSpending || {};
            const topCat = Object.entries(categories).sort((a, b) => b[1] - a[1])[0];
            document.getElementById('topCategory').textContent = topCat ? topCat[0] : '-';

            renderCharts(categories);
        } catch (e) {
            console.error('Dashboard load error:', e);
        }
    }

    function renderCharts(categories) {
        const labels = Object.keys(categories);
        const values = Object.values(categories);
        const colors = ['#4cc9f0','#4361ee','#a855f7','#ff6363','#4cc996','#f59e0b'];

        if (pieChart) pieChart.destroy();
        if (barChart) barChart.destroy();

        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors,
                    borderWidth: 0
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: '#fff', font: { size: 12 } } }
                }
            }
        });

        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Amount Spent (₹)',
                    data: values,
                    backgroundColor: colors,
                    borderRadius: 8
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: '#fff' } }
                },
                scales: {
                    x: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            }
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    populateMonths();
    loadDashboard();
</script>

</body>
</html>
