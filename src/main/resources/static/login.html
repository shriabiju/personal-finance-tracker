<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }
        .login-card h2 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-card p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        .form-label {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            padding: 12px 15px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #4cc9f0;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(76,201,240,0.15);
        }
        .form-control::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn-login {
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76,201,240,0.4);
            color: #fff;
        }
        .register-link {
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a {
            color: #4cc9f0;
            text-decoration: none;
            font-weight: 600;
        }
        .alert-error {
            background: rgba(255, 99, 99, 0.15);
            border: 1px solid rgba(255,99,99,0.3);
            color: #ff6363;
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 14px;
            display: none;
        }
        .brand-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center">
        <div class="brand-icon">💰</div>
        <h2>Welcome Back</h2>
        <p>Sign in to your finance dashboard</p>
    </div>

    <div class="alert-error" id="errorMsg">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span id="errorText">Invalid credentials</span>
    </div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com">
    </div>

    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password">
    </div>

    <button class="btn-login" onclick="login()">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
    </button>

    <div class="register-link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script>
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        if (!email || !password) {
            errorText.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const response = await fetch(`http://localhost:8080/api/users/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
                method: 'POST'
            });

            if (response.ok) {
                const user = await response.json();
                localStorage.setItem('userId', user.id);
                localStorage.setItem('userName', user.name);
                window.location.href = 'dashboard.html';
            } else {
                errorText.textContent = 'Invalid email or password.';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorText.textContent = 'Server error. Make sure backend is running.';
            errorMsg.style.display = 'block';
        }
    }

    // Allow Enter key to login
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
