<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }
        .register-card h2 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .register-card p {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        .form-label {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            padding: 12px 15px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #4cc9f0;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(76,201,240,0.15);
        }
        .form-control::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn-register {
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76,201,240,0.4);
            color: #fff;
        }
        .login-link {
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-link a {
            color: #4cc9f0;
            text-decoration: none;
            font-weight: 600;
        }
        .alert-msg {
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 14px;
            display: none;
        }
        .alert-error {
            background: rgba(255, 99, 99, 0.15);
            border: 1px solid rgba(255,99,99,0.3);
            color: #ff6363;
        }
        .alert-success {
            background: rgba(76, 201, 150, 0.15);
            border: 1px solid rgba(76,201,150,0.3);
            color: #4cc996;
        }
        .brand-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center">
        <div class="brand-icon">💰</div>
        <h2>Create Account</h2>
        <p>Start tracking your finances today</p>
    </div>

    <div class="alert-msg alert-error" id="errorMsg">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span id="errorText"></span>
    </div>

    <div class="alert-msg alert-success" id="successMsg">
        <i class="fas fa-check-circle me-2"></i>
        <span id="successText"></span>
    </div>

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="John Doe">
    </div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com">
    </div>

    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Create a password">
    </div>

    <button class="btn-register" onclick="register()">
        <i class="fas fa-user-plus me-2"></i>Create Account
    </button>

    <div class="login-link">
        Already have an account? <a href="login.html">Sign in here</a>
    </div>
</div>

<script>
    async function register() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!name || !email || !password) {
            errorText.textContent = 'Please fill in all fields.';
            errorMsg.style.display = 'block';
            return;
        }

        if (password.length < 6) {
            errorText.textContent = 'Password must be at least 6 characters.';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            if (response.ok) {
                successText.textContent = 'Account created! Redirecting to login...';
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                const msg = await response.text();
                errorText.textContent = msg.includes('Email') ? 'Email already registered.' : 'Registration failed.';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorText.textContent = 'Server error. Make sure backend is running.';
            errorMsg.style.display = 'block';
        }
    }

    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') register();
    });
</script>

</body>
</html>
